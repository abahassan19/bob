app = "bob-bwwvig"
primary_region = "ams"

[http_service]
  internal_port = 10000
  force_https = false
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 1080
  processes = ["app"]

  [[services.ports]]
    port = 1080

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
  memory_mb = 256
